description.Spanish=Un reputado detective de policía se ve envuelto en un extraño caso aparentemente paranormal. \n No es demasiado creyente de estos temas, pero no tiene más remedio que aceptar este caso, el volumen de su trabajo se ha visto afectado negativamente tras sufrir un accidente automovilístico durante una investigación. \n\n En este escenario nos meteremos en el rol que todos los jugadores somos un único personaje principal \n\n Advertencia: el escenario contiene mucho texto para poder introducir mejor a los jugadores en situación con la historia. \n\n A tener en cuenta: dependiendo de las acciones que tomen los jugadores, habrán distintos finales para esta historia, teniendo un total de hasta cuatro finales posibles. \n -------------------------------------------\nTamaño máximo del mapa: 3.5x3.5 tableros cuadrados
description.French=Un célèbre détective de police se retrouve mêlé à une étrange affaire apparemment paranormale. \n Peu enclin à croire à ces sujets, il n'a d'autre choix que d'accepter cette enquête, le volume de son travail ayant été négativement affecté après un accident de voiture survenu lors d'une précédente investigation. \n\n Dans ce scénario, tous les joueurs incarneront un seul et même personnage principal. \n\n Attention : ce scénario contient beaucoup de texte afin de mieux immerger les joueurs dans l'histoire. \n\n À noter : selon les actions entreprises par les joueurs, l'histoire pourra déboucher sur quatre fins différentes au total. \n -------------------------------------------\nTaille maximale de la carte : 3.5x3.5 tuiles carrées
